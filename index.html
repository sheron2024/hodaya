<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לונה — חד הקרן האבוד</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#fff; font-family:Arial,sans-serif; overflow:hidden; direction:rtl; }
canvas { display:block; }

/* HUD */
#hud { position:absolute; top:16px; right:16px; background:rgba(0,0,0,0.75); border:1px solid #9b59b6; border-radius:14px; padding:12px 16px; min-width:190px; }
#hud .wname { font-size:12px; color:#c39bd3; margin-bottom:3px; }
#hud .pname { font-size:15px; font-weight:bold; color:#f8c8ff; }
#hud .bars { display:flex; gap:10px; margin-top:7px; align-items:center; }
#hud .bar { width:65px; height:6px; background:#333; border-radius:3px; overflow:hidden; }
#hud .bf { height:100%; border-radius:3px; transition:width 0.3s; }
#hp { background:#e74c9f; width:100%; }
#mp { background:#9b59b6; width:80%; }
#sparks { margin-top:6px; font-size:12px; color:#f8c8ff; }

/* Narrator box */
#narrator { position:absolute; top:16px; left:50%; transform:translateX(-50%); width:min(500px,88vw);
  background:rgba(20,10,40,0.95); border:1px solid #9b59b6; border-radius:14px;
  padding:14px 20px; display:none; z-index:5; }
#narrator-text { font-size:14px; color:#e8d5ff; line-height:1.7; font-style:italic; }

/* Dialog */
#dialog { position:absolute; bottom:110px; left:50%; transform:translateX(-50%);
  width:min(540px,90vw); background:rgba(10,5,30,0.97); border:1px solid #9b59b6;
  border-radius:16px; padding:20px 24px; display:none; }
#dialog-portrait { width:56px; height:56px; border-radius:50%; border:2px solid #9b59b6;
  margin-left:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:28px; }
#dialog-header { display:flex; align-items:center; margin-bottom:10px; flex-direction:row-reverse; }
#dialog-name { font-size:13px; color:#c39bd3; }
#dialog-ind { display:none; gap:3px; align-items:center; margin-right:8px; }
#dialog-ind span { display:inline-block; width:4px; height:14px; background:#9b59b6; border-radius:2px; animation:wave 0.8s infinite; }
#dialog-ind span:nth-child(2){ animation-delay:.15s; height:20px; }
#dialog-ind span:nth-child(3){ animation-delay:.3s; }
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
#dialog-text { font-size:15px; line-height:1.65; color:#f0e8ff; }
#dialog-hint { margin-top:10px; font-size:12px; color:#9b59b6; animation:pulse 1.5s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* Puzzle overlay */
#puzzle { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:min(520px,92vw); background:rgba(8,4,24,0.98); border:1px solid #9b59b6;
  border-radius:18px; padding:26px; display:none; z-index:10; }
#puzzle h2 { font-size:18px; color:#f8c8ff; margin-bottom:6px; }
#puzzle-desc { font-size:13px; color:#c39bd3; margin-bottom:16px; line-height:1.5; }
#puzzle-area { }
#puzzle-fb { min-height:22px; font-size:14px; margin-top:12px; }
#puzzle-fb.ok { color:#5dcaa5; } #puzzle-fb.fail { color:#e74c3c; }

/* Spark popup */
#spark-popup { position:absolute; top:120px; left:50%; transform:translateX(-50%);
  background:linear-gradient(135deg,#9b59b6,#e74c9f); border-radius:20px;
  padding:12px 28px; font-size:15px; display:none; z-index:20; text-align:center; }

/* Notif */
#notif { position:absolute; top:80px; left:50%; transform:translateX(-50%);
  background:rgba(155,89,182,0.9); border-radius:20px; padding:8px 20px;
  font-size:14px; opacity:0; transition:opacity 0.4s; white-space:nowrap; pointer-events:none; }
#notif.show { opacity:1; }

/* Near prompt */
#near { position:absolute; bottom:170px; left:50%; transform:translateX(-50%);
  background:rgba(155,89,182,0.85); border-radius:20px; padding:7px 18px;
  font-size:13px; display:none; }

/* Map */
#map { position:absolute; bottom:16px; left:16px; background:rgba(0,0,0,0.65);
  border:1px solid #9b59b6; border-radius:12px; padding:10px 14px; }
#map .mt { font-size:11px; color:#9b59b6; margin-bottom:6px; }
#map .dots { display:flex; gap:7px; }
.dot { width:10px; height:10px; border-radius:50%; background:#333; border:1px solid #555; }
.dot.v { background:#9b59b6; border-color:#c39bd3; }
.dot.c { background:#f8c8ff; border-color:#fff; }

/* Buttons */
#btns { position:absolute; top:16px; left:16px; display:flex; flex-direction:column; gap:6px; }
#btns button { border:none; color:white; padding:8px 14px; border-radius:8px; font-size:12px; cursor:pointer; }
#soundbtn { background:rgba(155,89,182,0.6); }
#quitbtn { background:rgba(160,30,60,0.7); }

/* Pad */
#pad { position:absolute; bottom:90px; right:16px; display:grid;
  grid-template-columns:repeat(3,44px); grid-template-rows:repeat(3,44px); gap:4px; }
#pad button { background:rgba(155,89,182,0.5); border:1px solid #9b59b6;
  color:white; border-radius:8px; font-size:18px; cursor:pointer; }
#pad button:active { background:rgba(155,89,182,0.9); }
.empty { background:none!important; border:none!important; }

/* Hint */
#hint { position:absolute; bottom:16px; right:16px; background:rgba(0,0,0,0.5);
  border:1px solid #333; border-radius:10px; padding:8px 12px; font-size:11px; color:#888; }
#hint div { margin:2px 0; }

/* Flash */
#flash { position:absolute; inset:0; background:white; opacity:0; pointer-events:none; transition:opacity 0.4s; }

/* Quit screen */
#quit-screen { position:absolute; inset:0; background:rgba(0,0,0,0.93);
  display:none; z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
#quit-screen h2 { color:#f8c8ff; font-size:22px; }
#quit-screen button { padding:11px 28px; border-radius:10px; font-size:14px; cursor:pointer; border:none; color:white; }

/* Pipe puzzle */
.pipe-grid { display:grid; gap:3px; margin:0 auto; }
.pipe-cell { width:52px; height:52px; background:rgba(155,89,182,0.15); border:1px solid #533;
  border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:26px; transition:background 0.2s; user-select:none; }
.pipe-cell:hover { background:rgba(155,89,182,0.35); }
.pipe-cell.connected { background:rgba(93,202,165,0.3); border-color:#5dcaa5; }

/* Gear puzzle */
.gear-area { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-bottom:10px; }
.gear-slot { width:70px; height:70px; border:2px dashed #9b59b6; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:32px;
  background:rgba(155,89,182,0.1); cursor:pointer; transition:all 0.2s; }
.gear-slot.filled { border-color:#5dcaa5; background:rgba(93,202,165,0.2); }
.gear-tray { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
.gear-piece { width:60px; height:60px; border:2px solid #9b59b6; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:28px;
  background:rgba(155,89,182,0.25); cursor:grab; transition:all 0.2s; }
.gear-piece:hover { background:rgba(155,89,182,0.5); transform:scale(1.1); }
.gear-piece.used { opacity:0.3; cursor:not-allowed; }

/* Q buttons */
.q-btn { display:block; width:100%; margin:7px 0; padding:11px 14px;
  background:rgba(155,89,182,0.2); border:1px solid #9b59b6; color:#f0e8ff;
  border-radius:9px; cursor:pointer; font-size:14px; text-align:right; transition:background 0.2s; }
.q-btn:hover { background:rgba(155,89,182,0.5); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="flash"></div>

<div id="hud">
  <div class="wname" id="wname">עולם הענן הכחול</div>
  <div class="pname">🦄 לונה — חד הקרן</div>
  <div class="bars">
    <span style="font-size:11px;color:#e74c9f">♥</span>
    <div class="bar"><div class="bf" id="hp"></div></div>
    <span style="font-size:11px;color:#9b59b6">✦</span>
    <div class="bar"><div class="bf" id="mp"></div></div>
  </div>
  <div id="sparks">ניצוצות: 0/5 ✨</div>
</div>

<div id="narrator"><div id="narrator-text"></div></div>

<div id="map">
  <div class="mt">מפת העולמות</div>
  <div class="dots">
    <div class="dot c" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>

  </div>

  <button id="soundbtn" onclick="toggleSound()">🔊 צליל: פועל</button>

</div>

  <div>W/A/S/D — תנועה</div>

  <div>E — אינטרקציה</div>
  <div>Q — עולם הבא</div>
</div>

<div id="pad">
  <div class="empty"></div>
  <button onmousedown="K.w=true" onmouseup="K.w=false" ontouchstart="K.w=true" ontouchend="K.w=false">▲</button>
  <div class="empty"></div>
  <button onmousedown="K.a=true" onmouseup="K.a=false" ontouchstart="K.a=true" ontouchend="K.a=false">◀</button>
  <button onmousedown="K.s=true" onmouseup="K.s=false" ontouchstart="K.s=true" ontouchend="K.s=false">▼</button>
  <button onmousedown="K.d=true" onmouseup="K.d=false" ontouchstart="K.d=true" ontouchend="K.d=false">▶</button>

  <button onmousedown="interact()">E</button>
  <div class="empty"></div>
</div>

<div id="near">לחץ E לאינטרקציה</div>
<div id="notif"></div>
<div id="spark-popup"></div>

<div id="dialog">
  <div id="dialog-header">
    <div id="dialog-portrait">🐉</div>
    <div>
      <div id="dialog-name"></div>
      <div id="dialog-ind"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div id="dialog-text"></div>
  <div id="dialog-hint">לחץ E להמשך...</div>
</div>

<div id="puzzle">
  <h2 id="puzzle-title"></h2>
  <div id="puzzle-desc"></div>
  <div id="puzzle-area"></div>
  <div id="puzzle-fb"></div>
</div>

<div id="quit-screen">
  <h2>🦄 השהיית המסע</h2>
  <p style="color:#c39bd3">ניצוצות שנאספו: <span id="qs-sparks">0</span>/5</p>
  <div style="display:flex;gap:14px">
    <button style="background:#9b59b6" onclick="hideQuit()">▶ המשך</button>
    <button style="background:#a32d2d" onclick="quitGame()">✕ יציאה</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
let audioCtx=null, masterGain=null, bgNodes=[], bgGain=null;
let soundEnabled=true, footTimer=0, ttsAlive=null;

function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain(); masterGain.gain.value=0.4;
  masterGain.connect(audioCtx.destination);
}

function toggleSound(){
  soundEnabled=!soundEnabled;
  if(masterGain) masterGain.gain.value=soundEnabled?0.4:0;
  if(!soundEnabled){stopBg();stopSpeech();}
  document.getElementById('soundbtn').textContent=soundEnabled?'🔊 צליל: פועל':'🔇 צליל: כבוי';
}

// Magical melodies per world
const MELODIES=[
  [264,330,396,440,396,330,264,220,264,330,396,523],
  [220,277,330,369,330,277,220,185,220,277,330,440],
  [523,659,784,880,784,659,523,440,523,659,784,1046],
  [293,349,415,466,415,349,293,247,293,349,415,587],
  [349,440,523,587,523,440,349,294,349,440,523,698],
];
const NOTE_DUR=1.3;

function playBg(idx){
  stopBg();
  if(!audioCtx||!soundEnabled) return;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(1,audioCtx.currentTime+2.5);
  g.connect(masterGain);
  const mel=MELODIES[idx]; const nodes=[];
  let looping=true;
  function loop(st){
    if(!looping) return;
    mel.forEach((f,i)=>{
      const t=st+i*NOTE_DUR;
      const o=audioCtx.createOscillator(), gn=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      gn.gain.setValueAtTime(0,t);
      gn.gain.linearRampToValueAtTime(0.065,t+0.2);
      gn.gain.setValueAtTime(0.065,t+NOTE_DUR*0.65);
      gn.gain.linearRampToValueAtTime(0,t+NOTE_DUR*0.95);
      o.connect(gn); gn.connect(g);
      o.start(t); o.stop(t+NOTE_DUR); nodes.push(o);
    });
    const dur=mel.length*NOTE_DUR+2;
    setTimeout(()=>{if(looping)loop(audioCtx.currentTime);},dur*1000);
  }
  loop(audioCtx.currentTime+0.5);
  // Bass
  const b=audioCtx.createOscillator(),bg=audioCtx.createGain();
  b.type='sine'; b.frequency.value=mel[0]/2; bg.gain.value=0.02;
  b.connect(bg); bg.connect(g); b.start(); nodes.push(b);
  bgNodes=nodes; bgGain=g; bgGain._stop=()=>{looping=false;};
}

function stopBg(){
  if(bgGain){try{bgGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1);}catch(e){}
    if(bgGain._stop)bgGain._stop();}
  const n=bgNodes; setTimeout(()=>n.forEach(x=>{try{x.stop();}catch(e){}}),1100);
  bgNodes=[]; bgGain=null;
}

function sfx(type){
  if(!audioCtx||!soundEnabled) return;
  const t=audioCtx.currentTime;
  if(type==='step'){
    const buf=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*0.05),audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length)*0.4;
    const s=audioCtx.createBufferSource(),g=audioCtx.createGain();
    g.gain.value=0.06; s.buffer=buf; s.connect(g); g.connect(masterGain); s.start();
  } else if(type==='portal'){
    [300,500,800,1200,1800].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.1,t+i*0.08); g.gain.linearRampToValueAtTime(0,t+i*0.08+0.5);
      o.connect(g); g.connect(masterGain); o.start(t+i*0.08); o.stop(t+i*0.08+0.6);
    });
  } else if(type==='win'){
    [523,659,784,1046,1318].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      g.gain.setValueAtTime(0.1,t+i*0.09); g.gain.linearRampToValueAtTime(0,t+i*0.09+0.5);
      o.connect(g); g.connect(masterGain); o.start(t+i*0.09); o.stop(t+i*0.09+0.6);
    });
  } else if(type==='fail'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(400,t); o.frequency.linearRampToValueAtTime(200,t+0.4);
    g.gain.setValueAtTime(0.08,t); g.gain.linearRampToValueAtTime(0,t+0.45);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.5);
  } else if(type==='click'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine'; o.frequency.setValueAtTime(600,t); o.frequency.linearRampToValueAtTime(900,t+0.08);
    g.gain.setValueAtTime(0.07,t); g.gain.linearRampToValueAtTime(0,t+0.12);
    o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.15);
  }
}

// ══════════════════════════════════════════
// TTS
// ══════════════════════════════════════════
const VOICE_SETTINGS=[
  {pitch:0.75,rate:0.78}, // World 0: dragon — deep
  {pitch:1.5,rate:1.0},   // World 1: fairy — high
  {pitch:0.9,rate:0.82},  // World 2: crystal king — regal
  {pitch:1.2,rate:0.7},   // World 3: magic clock — quirky
  {pitch:1.1,rate:0.72},  // World 4: flower — warm
  {pitch:1.0,rate:0.8},   // Narrator
];

let dialogReady=false;

function speakAndWait(text,vi,onDone){
  if(!soundEnabled){if(onDone)onDone();return;}
  stopSpeech();
  const parts=text.split(/(?<=[.!?])\s+/).filter(s=>s.trim());
  if(!parts.length){if(onDone)onDone();return;}
  let i=0;
  function next(){
    if(i>=parts.length){
      document.getElementById('dialog-ind').style.display='none';
      if(onDone)onDone(); return;
    }
    const u=new SpeechSynthesisUtterance(parts[i]);
    const vs=VOICE_SETTINGS[vi||0];
    u.pitch=vs.pitch; u.rate=vs.rate; u.volume=0.95; u.lang='he-IL';
    const voices=speechSynthesis.getVoices();
    const hv=voices.find(v=>v.lang&&v.lang.startsWith('he'));
    const ev=voices.find(v=>v.lang&&v.lang.startsWith('en'));
    if(hv)u.voice=hv; else if(ev)u.voice=ev; else if(voices[0])u.voice=voices[0];
    const ind=document.getElementById('dialog-ind');
    u.onstart=()=>{if(ind)ind.style.display='flex';};
    u.onend=()=>{i++;next();};
    u.onerror=()=>{i++;next();};
    speechSynthesis.speak(u);
  }
  next();
  if(ttsAlive)clearInterval(ttsAlive);
  ttsAlive=setInterval(()=>{
    if(!speechSynthesis.speaking){clearInterval(ttsAlive);ttsAlive=null;return;}
    if(speechSynthesis.paused)speechSynthesis.resume();
  },4000);
}

function stopSpeech(){
  try{speechSynthesis.cancel();}catch(e){}
  if(ttsAlive){clearInterval(ttsAlive);ttsAlive=null;}
  const ind=document.getElementById('dialog-ind');
  if(ind)ind.style.display='none';
}

if(typeof speechSynthesis!=='undefined'&&speechSynthesis.onvoiceschanged!==undefined)
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();

// ══════════════════════════════════════════
// NARRATOR
// ══════════════════════════════════════════
function narrate(text,dur=5000){
  const el=document.getElementById('narrator');
  document.getElementById('narrator-text').textContent=text;
  el.style.display='block';
  speakAndWait(text,5,()=>{});
  setTimeout(()=>el.style.display='none',dur);
}

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
let sparks=0, hp_val=100, mp_val=80;
let worldIdx=0, gameActive=true;
let dialogOn=false,puzzleOn=false;
let dQueue=[],dIdx=0,curNPC=null;
let worldObjs=[],npcList=[],floaters=[],birds=[];

const WORLDS=[
  {name:'עולם הענן הכחול',   sky:0x0d1b4a,ground:0x1a2a6e,fog:0x0d1540,amb:0x1a2880,nc:0x88ccff,hasTrees:true, hasSea:false,hasBirds:true,
   narration:'לונה נכנסת לעולם הענן הכחול. ערפל כסוף מכסה הכל, וקול עמוק ועתיק מהדהד מבין העננים...'},
  {name:'יערות הפיות',        sky:0x1a0a00,ground:0x2d1500,fog:0x3a1000,amb:0x6b2a00,nc:0xff9944,hasTrees:true, hasSea:false,hasBirds:false,
   narration:'היער בוער בצבעי זהב ואדום. פיה קטנה ושובבה מרחפת בין העצים, מחכה לאתגר את לונה...'},
  {name:'ממלכת הקריסטלים',   sky:0x001525,ground:0x002a44,fog:0x001828,amb:0x005580,nc:0x44aaff,hasTrees:false,hasSea:true, hasBirds:true,
   narration:'גבישים ענקיים מנצנצים בכל עבר. מלך הקריסטל יושב על כסאו ועיניו עצובות כמו ים בסערה...'},
  {name:'ארץ השעונים',        sky:0x100820,ground:0x1e1030,fog:0x140a28,amb:0x3a1060,nc:0xdd88ff,hasTrees:false,hasSea:false,hasBirds:false,

function makeTree(x,z,col){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.22,1.4,6),
    new THREE.MeshLambertMaterial({color:0x5c3d1e}));
  trunk.position.y=0.7; g.add(trunk);
  [[1.6,1.1],[2.3,0.9],[3.0,0.7]].forEach(([y,r])=>{
    const leaves=new THREE.Mesh(new THREE.ConeGeometry(r,1.1,7),
      new THREE.MeshLambertMaterial({color:col}));
    leaves.position.y=y; g.add(leaves);
  });
  g.position.set(x,0,z); return g;
}

function makeBird(){
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:0xffffff});
  const b=new THREE.Mesh(new THREE.SphereGeometry(0.07,6,6),mat);
  const wL=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.02,0.07),mat);
  const wR=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.02,0.07),mat);
  wL.position.set(-0.12,0,0); wR.position.set(0.12,0,0);

}

function build(idx){
  const w=WORLDS[idx];
  scene.background=new THREE.Color(w.sky);
  scene.fog=new THREE.FogExp2(w.fog,0.032);
  worldObjs.forEach(o=>scene.remove(o));
  worldObjs=[]; npcList=[]; floaters=[]; birds=[];

  const al=new THREE.AmbientLight(w.amb,1.7);
  const dl=new THREE.DirectionalLight(0xffffff,0.8);
  dl.position.set(8,15,5);
  scene.add(al); scene.add(dl);
  worldObjs.push(al); worldObjs.push(dl);

  // Ground
  const gr=new THREE.Mesh(new THREE.PlaneGeometry(100,100),
    new THREE.MeshLambertMaterial({color:w.ground}));
  gr.rotation.x=-Math.PI/2; scene.add(gr); worldObjs.push(gr);

  // Sea
  if(w.hasSea){
    const sea=new THREE.Mesh(new THREE.PlaneGeometry(35,18),
      new THREE.MeshLambertMaterial({color:idx===4?0x00bbcc:0x1155aa,transparent:true,opacity:0.7}));
    sea.rotation.x=-Math.PI/2; sea.position.set(-14,0.05,-18);
    sea.userData.isSea=true; scene.add(sea); worldObjs.push(sea); floaters.push(sea);
  }

  // Structures
  for(let i=0;i<18;i++){
    const h=Math.random()*5+1;
    const m=new THREE.Mesh(new THREE.BoxGeometry(1+Math.random(),h,1+Math.random()),
      new THREE.MeshLambertMaterial({color:new THREE.Color(w.ground).offsetHSL(0,0,Math.random()*0.2)}));
    const rx=(Math.random()-.5)*45, rz=(Math.random()-.5)*45;
    if(Math.abs(rx)<5&&Math.abs(rz)<7) continue;
    m.position.set(rx,h/2,rz); scene.add(m); worldObjs.push(m);
  }

  // Crystals (world 2)
  if(idx===2){
    for(let i=0;i<12;i++){
      const h=Math.random()*4+1.5;
      const cr=new THREE.Mesh(new THREE.CylinderGeometry(0,0.28,h,5),
        new THREE.MeshLambertMaterial({color:0x66ccff,transparent:true,opacity:0.75,emissive:0x1155aa,emissiveIntensity:0.4}));
      cr.position.set((Math.random()-.5)*35,h/2,(Math.random()-.5)*35);
      scene.add(cr); worldObjs.push(cr);
    }
  }

  // Gears (world 3)
  if(idx===3){
    for(let i=0;i<6;i++){
      const r=0.8+Math.random()*1.5;
      const gear=new THREE.Mesh(new THREE.CylinderGeometry(r,r,0.3,Math.floor(6+r*4)),
        new THREE.MeshLambertMaterial({color:0x886699,emissive:0x443366,emissiveIntensity:0.3}));
      gear.position.set((Math.random()-.5)*20,r,(Math.random()-.5)*20);
      gear.userData.isGear=true; scene.add(gear); worldObjs.push(gear); floaters.push(gear);
    }
  }

  // Trees
  if(w.hasTrees){
    const tc=idx===4?0x44cc44:idx===1?0xcc5500:0x2d7a3d;
    for(let i=0;i<16;i++){
      const tx=(Math.random()-.5)*44, tz=(Math.random()-.5)*44;
      if(Math.abs(tx)<6&&Math.abs(tz)<8) continue;
      const t=makeTree(tx,tz,tc); scene.add(t); worldObjs.push(t);
    }
  }

  // Orbs
  for(let i=0;i<8;i++){
    const r=Math.random()*0.28+0.1;
    const c=new THREE.Color(w.nc);
    const orb=new THREE.Mesh(new THREE.SphereGeometry(r,8,8),
      new THREE.MeshLambertMaterial({color:c,emissive:c,emissiveIntensity:0.5}));
    orb.position.set((Math.random()-.5)*25,r+Math.random()*3,(Math.random()-.5)*25);
    scene.add(orb); worldObjs.push(orb); floaters.push(orb);
  }

  // Birds
  if(w.hasBirds){
    for(let i=0;i<5;i++){
      const b=makeBird();
      b.position.set((Math.random()-.5)*28,4+Math.random()*4,(Math.random()-.5)*28);
      b.userData.speed=0.3+Math.random()*0.3;
      b.userData.dir=Math.random()*Math.PI*2;
      b.userData.fp=Math.random()*Math.PI*2;
      scene.add(b); worldObjs.push(b); birds.push(b);
    }
  }

  // NPCs
  NPCS.filter(n=>n.world===idx).forEach(nd=>{
    const g=makeNPCCartoon(nd);
    g.position.set(...nd.pos);
    scene.add(g); worldObjs.push(g); npcList.push(g);
  });

  // Portal
  const nw=WORLDS[(idx+1)%WORLDS.length];
  const portal=new THREE.Mesh(new THREE.TorusGeometry(1.6,0.16,12,40),
    new THREE.MeshLambertMaterial({color:new THREE.Color(nw.nc),emissive:new THREE.Color(nw.nc),emissiveIntensity:1.0}));
  portal.position.set(0,1.6,-15); scene.add(portal); worldObjs.push(portal);
  const pi=new THREE.Mesh(new THREE.CircleGeometry(1.44,32),
    new THREE.MeshLambertMaterial({color:new THREE.Color(nw.sky),transparent:true,opacity:0.6}));
  pi.position.set(0,1.6,-15.01); scene.add(pi); worldObjs.push(pi);

  // Update HUD
  document.getElementById('wname').textContent=w.name;
  for(let i=0;i<5;i++){
    const d=document.getElementById('d'+i);
    if(d) d.className='dot'+(i<idx?' v':i===idx?' c':'');
  }
  player.position.set(0,0,5); yaw=Math.PI;
  if(audioCtx&&soundEnabled) playBg(idx);

  // Narrate world entry
  setTimeout(()=>narrate(w.narration,8000),1200);
}

// ─── PIPE PUZZLE ───
function buildPipePuzzle(onWin){
  const area=document.getElementById('puzzle-area');
  area.innerHTML='';
  const SIZE=4;
  // Pipe types: [top,right,bottom,left] connections
  const PIPES=[
    {sym:'━',c:[0,1,0,1]},{sym:'┃',c:[1,0,1,0]},
    {sym:'┗',c:[1,1,0,0]},{sym:'┛',c:[1,0,0,1]},
    {sym:'┓',c:[0,1,1,0]},{sym:'┏',c:[0,0,1,1]},
    {sym:'┣',c:[1,1,1,0]},{sym:'┳',c:[0,1,1,1]},
    {sym:'┫',c:[1,0,1,1]},{sym:'┻',c:[1,1,0,1]},
    {sym:'╋',c:[1,1,1,1]},{sym:'·',c:[0,0,0,0]},
  ];
  // Generate a solvable grid
  const grid=[];
  for(let r=0;r<SIZE;r++){
    grid[r]=[];
    for(let col=0;col<SIZE;col++){
      const pIdx=Math.floor(Math.random()*10);
      grid[r][col]={...PIPES[pIdx],rot:Math.floor(Math.random()*4)};
    }
  }
  // Force start/end
  grid[0][0]={...PIPES[2],rot:0};
  grid[SIZE-1][SIZE-1]={...PIPES[3],rot:0};

  const container=document.createElement('div');
  container.className='pipe-grid';
  container.style.gridTemplateColumns=`repeat(${SIZE},52px)`;

  function rotPipe(p){
    const r=p.rot%4;
    const c=[...p.c];
    for(let i=0;i<r;i++){const t=c[3];c[3]=c[2];c[2]=c[1];c[1]=c[0];c[0]=t;}
    return c;
  }

  function checkSolved(){
    // Simple check: all cells have at least one connection
    let ok=true;
    for(let r=0;r<SIZE;r++) for(let co=0;co<SIZE;co++){
      const rc=rotPipe(grid[r][co]);
      if(r>0&&rc[0]!==rotPipe(grid[r-1][co])[2]) ok=false;
      if(co<SIZE-1&&rc[1]!==rotPipe(grid[r][co+1])[3]) ok=false;
    }
    return ok;
  }

  const cells=[];
  for(let r=0;r<SIZE;r++){
    for(let co=0;co<SIZE;co++){
      const cell=document.createElement('div');
      cell.className='pipe-cell';
      const p=grid[r][co];
      cell.textContent=p.sym;
      cell.style.fontSize='28px';
      cell.style.fontFamily='monospace';
      const rr=r,cc=co;
      cell.onclick=()=>{
        sfx('click');
        grid[rr][cc].rot=(grid[rr][cc].rot+1)%4;
        cell.style.transform=`rotate(${grid[rr][cc].rot*90}deg)`;
        // Check if connected on right/bottom
        const rc=rotPipe(grid[rr][cc]);
        cell.classList.toggle('connected',rc[1]===1||rc[2]===1);
        if(checkSolved()){
          sfx('win');
          document.getElementById('puzzle-fb').textContent='✓ הצינורות מחוברים! המים זורמים!';
          document.getElementById('puzzle-fb').className='ok';
          setTimeout(onWin,1500);
        }
      };
      cells.push(cell);
      container.appendChild(cell);
    }
  }
  area.appendChild(container);
}

// ─── GEAR PUZZLE ───
function buildGearPuzzle(onWin){
  const area=document.getElementById('puzzle-area');
  area.innerHTML='';
  const gears=[
    {id:0,sym:'⚙️',size:'גדול',order:0},
    {id:1,sym:'🔩',size:'בינוני',order:1},
    {id:2,sym:'⚙',size:'קטן',order:2},
    {id:3,sym:'🔘',size:'זעיר',order:3},
  ];
  const shuffled=[...gears].sort(()=>Math.random()-0.5);
  const slots=new Array(4).fill(null);

  const slotArea=document.createElement('div');
  slotArea.className='gear-area';
  const slotEls=[];
  for(let i=0;i<4;i++){
    const s=document.createElement('div');
    s.className='gear-slot';
    s.dataset.idx=i;
    s.textContent=`${i+1}`;
    s.onclick=()=>{
      if(dragGear===null) return;
      if(slots[i]!==null) return;
      slots[i]=dragGear;
      s.textContent=shuffled[dragGear].sym;
      s.classList.add('filled');
      s.style.fontSize='28px';
      document.querySelector(`[data-gear="${dragGear}"]`).classList.add('used');
      dragGear=null;
      sfx('click');
      if(slots.every(v=>v!==null)){
        const correct=slots.every((v,i)=>shuffled[v].order===i);
        if(correct){
          sfx('win');
          document.getElementById('puzzle-fb').textContent='✓ המכונה עובדת! גלגלי השיניים מסתובבים!';
          document.getElementById('puzzle-fb').className='ok';
          setTimeout(onWin,1500);
        } else {
          sfx('fail');
          document.getElementById('puzzle-fb').textContent='✗ הסדר לא נכון. נסי שוב!';
          document.getElementById('puzzle-fb').className='fail';
          slots.fill(null);
          slotEls.forEach((s,i)=>{s.textContent=`${i+1}`;s.classList.remove('filled');s.style.fontSize='16px';});
          document.querySelectorAll('.gear-piece').forEach(g=>g.classList.remove('used'));
        }
      }
    };
    slotEls.push(s); slotArea.appendChild(s);
  }

  let dragGear=null;
  const tray=document.createElement('div'); tray.className='gear-tray';
  shuffled.forEach((g,i)=>{
    const piece=document.createElement('div');
    piece.className='gear-piece';
    piece.textContent=g.sym; piece.dataset.gear=i;
    piece.style.fontSize='28px';
    piece.title=g.size;
    piece.onclick=()=>{
      if(piece.classList.contains('used')) return;
      document.querySelectorAll('.gear-piece').forEach(p=>p.style.border='2px solid #9b59b6');
      dragGear=i;
      piece.style.border='2px solid #5dcaa5';
      sfx('click');
    };
    tray.appendChild(piece);
  });

  const inst=document.createElement('div');
  inst.style.cssText='font-size:12px;color:#9b59b6;margin-bottom:8px;text-align:center;';
  inst.textContent='לחצי על גלגל ואז על חריץ';
  area.appendChild(inst);
  area.appendChild(slotArea);
  area.appendChild(tray);
}

// ══════════════════════════════════════════
// DIALOG & PUZZLE FLOW
// ══════════════════════════════════════════
function notify(msg){
  const n=document.getElementById('notif');
  n.textContent=msg; n.classList.add('show');
  setTimeout(()=>n.classList.remove('show'),2800);
}

function updateHUD(){
  document.getElementById('hp').style.width=hp_val+'%';
  document.getElementById('mp').style.width=mp_val+'%';
  document.getElementById('sparks').textContent='ניצוצות: '+sparks+'/5 ✨';
}

function showSparkPopup(msg){
  const el=document.getElementById('spark-popup');
  el.innerHTML='<div style="font-size:24px">✨</div><div>'+msg+'</div>';
  el.style.display='block';
  setTimeout(()=>el.style.display='none',3500);
}

function startDialog(npc){
  if(dialogOn||puzzleOn) return;
  sfx('click');
  curNPC=npc; dialogOn=true; dialogReady=false;
  dQueue=npc.dialog; dIdx=0;
  document.getElementById('dialog-portrait').textContent=npc.emoji;
  showDialogLine(0);
}

function showDialogLine(idx){
  dialogReady=false;
  document.getElementById('dialog-name').textContent=curNPC.name+' אומר:';
  document.getElementById('dialog-text').textContent=dQueue[idx];
  document.getElementById('dialog-hint').textContent='🔊 מדבר...';
  document.getElementById('dialog').style.display='block';
  speakAndWait(dQueue[idx],curNPC.voiceIdx,()=>{
    dialogReady=true;
    const isLast=idx===dQueue.length-1;
    document.getElementById('dialog-hint').textContent=isLast?'לחצי E לחידה...':'לחצי E להמשך...';
  });
}

function nextDialog(){
  if(speechSynthesis.speaking){
    stopSpeech(); dialogReady=true;
    const isLast=dIdx===dQueue.length-1;
    document.getElementById('dialog-hint').textContent=isLast?'לחצי E לחידה...':'לחצי E להמשך...';
    return;
  }
  if(!dialogReady) return;
  dIdx++;
  if(dIdx<dQueue.length){ showDialogLine(dIdx); }
  else {
    document.getElementById('dialog').style.display='none';
    dialogOn=false; dialogReady=false;
    if(curNPC&&curNPC.puzzle) openPuzzle(curNPC.puzzle);
  }
}

function openPuzzle(pz){
  puzzleOn=true;
  document.getElementById('puzzle-title').textContent=pz.title;
  document.getElementById('puzzle-desc').textContent=pz.desc;
  document.getElementById('puzzle-fb').textContent='';
  document.getElementById('puzzle-fb').className='';
  document.getElementById('puzzle-area').innerHTML='';

  const onWin=()=>winPuzzle(pz);

  if(pz.type==='pipes') buildPipePuzzle(onWin);
  else if(pz.type==='gears') buildGearPuzzle(onWin);
  else if(pz.type==='q'){
    const ct=document.getElementById('puzzle-area');
    pz.opts.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='q-btn'; b.textContent=o;
      b.onclick=()=>{
        if(i===pz.cor){sfx('win');winPuzzle(pz);}
        else{sfx('fail');
          document.getElementById('puzzle-fb').textContent='✗ נסי שוב!';
          document.getElementById('puzzle-fb').className='fail';
          mp_val=Math.max(10,mp_val-8); updateHUD();
        }
      };
      ct.appendChild(b);
    });
    setTimeout(()=>speakAndWait(pz.desc,curNPC?curNPC.voiceIdx:5,()=>{}),300);
  }

  const cl=document.createElement('button');
  cl.textContent='✕ סגור'; cl.className='q-btn';
  cl.style.cssText='margin-top:10px;background:rgba(100,0,0,0.3);border-color:#a32d2d;color:#f09595;';
  cl.onclick=()=>{stopSpeech();document.getElementById('puzzle').style.display='none';puzzleOn=false;};
  document.getElementById('puzzle-area').appendChild(cl);
  document.getElementById('puzzle').style.display='block';
}

function winPuzzle(pz){
  sparks++; mp_val=Math.min(100,mp_val+20); hp_val=Math.min(100,hp_val+10); updateHUD();
  document.getElementById('puzzle-fb').textContent='✨ ניצוץ נאסף!';
  document.getElementById('puzzle-fb').className='ok';
  showSparkPopup('ניצוץ '+ sparks +' מתוך 5 נאסף! 🦄');
  if(curNPC) curNPC._done=true;
  const reward=pz.reward||'ניצוץ הקרן חזר!';
  setTimeout(()=>{
    speakAndWait(reward,curNPC?curNPC.voiceIdx:5,()=>{
      setTimeout(()=>{
        document.getElementById('puzzle').style.display='none';
        puzzleOn=false;
        if(sparks>=5){
          setTimeout(()=>narrate('לונה — כל ניצוצות הקרן חזרו! הקרן מאירה שוב בקסם! המסע הסתיים בניצחון! 🦄✨',8000),1000);
        }
      },800);
    });
  },500);
}

function interact(){
  if(!audioCtx){initAudio();playBg(worldIdx);}
  if(!gameActive||puzzleOn) return;
  if(dialogOn){nextDialog();return;}
  let nearest=null,nd=99;
  npcList.forEach(n=>{const d=player.position.distanceTo(n.position);if(d<3.5&&d<nd){nd=d;nearest=n;}});
  if(nearest){startDialog(nearest.userData.npc);return;}
  if(player.position.distanceTo(new THREE.Vector3(0,1.6,-15))<3) goNext();
}

function goNext(){
  sfx('portal'); stopSpeech();
  const fl=document.getElementById('flash'); fl.style.opacity='1';
  setTimeout(()=>fl.style.opacity='0',400);
  worldIdx=(worldIdx+1)%WORLDS.length;
  setTimeout(()=>{build(worldIdx);},300);
}

function showQuit(){
  document.getElementById('qs-sparks').textContent=sparks;
  document.getElementById('quit-screen').style.display='flex';
  stopBg(); stopSpeech(); gameActive=false;
  document.exitPointerLock&&document.exitPointerLock();
}
function hideQuit(){
  document.getElementById('quit-screen').style.display='none';
  gameActive=true;
  if(audioCtx&&soundEnabled)playBg(worldIdx);
}
function quitGame(){
  stopBg(); stopSpeech();
  document.getElementById('quit-screen').innerHTML=
    '<h2 style="color:#f8c8ff">🦄 המסע הסתיים</h2>'+
    '<p style="color:#c39bd3;font-size:15px">ניצוצות שנאספו: '+sparks+'/5 ✨</p>'+
    '<p style="color:#888;font-size:13px;margin-top:6px">'+(sparks>=5?'לונה הצליחה! הקרן מאירה שוב!':'המסע עוד לא הסתיים...')+'</p>'+
    '<button onclick="location.reload()" style="background:#9b59b6;padding:12px 28px;border-radius:10px;font-size:14px;cursor:pointer;border:none;color:white;margin-top:14px">▶ משחק חדש</button>';
}

// Controls
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup')K.w=true;
  if(k==='s'||k==='arrowdown')K.s=true;
  if(k==='a'||k==='arrowleft')K.a=true;
  if(k==='d'||k==='arrowright')K.d=true;
  if(k==='e')interact();
  if(k==='q')goNext();
  if(k==='escape')showQuit();
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup')K.w=false;
  if(k==='s'||k==='arrowdown')K.s=false;
  if(k==='a'||k==='arrowleft')K.a=false;
  if(k==='d'||k==='arrowright')K.d=false;
});
canvas.addEventListener('click',()=>{
  if(!audioCtx){initAudio();playBg(worldIdx);}
  if(!dialogOn&&!puzzleOn&&gameActive)canvas.requestPointerLock();
});
document.addEventListener('pointerlockchange',()=>{locked=document.pointerLockElement===canvas;});
document.addEventListener('mousemove',e=>{
  if(!locked||dialogOn||puzzleOn||!gameActive)return;
  yaw-=e.movementX*0.002;
  pitch=Math.max(-1.0,Math.min(1.0,pitch-e.movementY*0.002));
});
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

const fwd=new THREE.Vector3(),rt=new THREE.Vector3();
function loop(){
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;
  let moving=false;

  if(!dialogOn&&!puzzleOn&&gameActive){
    camera.rotation.order='YXZ';
    camera.rotation.y=yaw; camera.rotation.x=pitch;
    fwd.set(0,0,-1).applyEuler(new THREE.Euler(0,yaw,0));
    rt.set(1,0,0).applyEuler(new THREE.Euler(0,yaw,0));
    if(K.w){player.position.addScaledVector(fwd,3.5*dt);moving=true;}
    if(K.s){player.position.addScaledVector(fwd,-3.5*dt);moving=true;}
    if(K.a){player.position.addScaledVector(rt,-3.5*dt);moving=true;}
    if(K.d){player.position.addScaledVector(rt,3.5*dt);moving=true;}
    player.position.y=0;
    player.position.x=Math.max(-38,Math.min(38,player.position.x));
    player.position.z=Math.max(-38,Math.min(38,player.position.z));
  }

  if(moving&&audioCtx&&soundEnabled){
    footTimer+=dt;
    if(footTimer>0.42){sfx('step');footTimer=0;}
  } else footTimer=0;

  // Float orbs & sea
  floaters.forEach((o,i)=>{
    if(o.userData&&o.userData.isSea) o.position.y=0.05+Math.sin(t*0.5)*0.06;
    else if(o.userData&&o.userData.isGear) o.rotation.y=t*0.3*(i%2===0?1:-1);
    else o.position.y=Math.sin(t*0.7+i)*0.5+1.0;
  });

  // Birds
  birds.forEach((b,i)=>{
    b.userData.dir+=(Math.random()-0.5)*0.02;
    b.position.x+=Math.cos(b.userData.dir)*b.userData.speed*dt;
    b.position.z+=Math.sin(b.userData.dir)*b.userData.speed*dt;
    b.position.y=4+Math.sin(t*0.5+i)*0.5;
    b.rotation.y=-b.userData.dir+Math.PI/2;
    const flap=Math.sin(t*4+b.userData.fp)*0.3;
    if(b.userData.wL)b.userData.wL.rotation.z=flap;
    if(b.userData.wR)b.userData.wR.rotation.z=-flap;
    if(Math.abs(b.position.x)>25||Math.abs(b.position.z)>25)b.userData.dir+=Math.PI;
  });

  // NPC animation
  npcList.forEach(n=>{
    n.rotation.y=t*0.4;
    if(n.userData.glow)n.userData.glow.scale.setScalar(1+0.12*Math.sin(t*2.5));
  });

  // Proximity
  let near=false;
  npcList.forEach(n=>{if(player.position.distanceTo(n.position)<3.5)near=true;});
  const portalD=player.position.distanceTo(new THREE.Vector3(0,1.6,-15));
  document.getElementById('near').style.display=(near||portalD<3)?'block':'none';
  if(portalD<3)document.getElementById('near').textContent='לחצי E לעבור לעולם הבא ✨';
  else if(near)document.getElementById('near').textContent='לחצי E לשיחה 💬';

  renderer.render(scene,camera);
}

renderer.setAnimationLoop(loop);
build(0);
updateHUD();
setTimeout(()=>notify('לחצי על המסך להפעיל — W/A/S/D לתנועה, E לשיחה!'),800);
setTimeout(()=>narrate('לונה, חד הקרן הקסומה, התעוררה ומצאה שקרנה אבדה את כוחה. קוסם רשע פיזר את ניצוצות הקרן לחמישה עולמות שונים. עתה עליה לצאת למסע ולהחזיר אותם אחד אחד...',10000),2000);
</script>
