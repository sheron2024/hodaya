<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:'Heebo',Arial,sans-serif; overflow:hidden; direction:rtl; }
canvas { display:block; }

#hud { position:absolute; top:14px; right:14px; background:rgba(0,0,0,0.8); border:1px solid #9b59b6; border-radius:14px; padding:12px 16px; min-width:200px; backdrop-filter:blur(8px); }

#pad { position:absolute; bottom:80px; right:14px; display:grid;

.q-btn { display:block; width:100%; margin:6px 0; padding:11px 14px;

.seq-btn { display:inline-block; margin:5px; padding:10px 16px;

.gear-slot { width:72px; height:72px; border:2px dashed #9b59b6; border-radius:50%;

.gear-slot.filled { border-color:#5dcaa5; background:rgba(93,202,165,.2); }
.gear-piece { width:68px; height:68px; border:2px solid #9b59b6; border-radius:50%;

.gear-piece:hover { background:rgba(155,89,182,.5); transform:scale(1.08); }
.gear-piece.sel { border-color:#5dcaa5; box-shadow:0 0 12px #5dcaa5; }

.pattern-cell { display:inline-flex; align-items:center; justify-content:center;

.pattern-cell.answer { border-color:#9b59b6; background:rgba(155,89,182,.3); }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══ AUDIO ══
let audioCtx=null,masterGain=null,bgNodes=[],bgGain=null,soundEnabled=true,footTimer=0;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain(); masterGain.gain.value=0.4;
  masterGain.connect(audioCtx.destination);
}
function toggleSound(){
  soundEnabled=!soundEnabled;
  if(masterGain)masterGain.gain.value=soundEnabled?0.4:0;
  if(!soundEnabled){stopBg();stopSpeech();}
  document.getElementById('snd-btn').textContent=soundEnabled?'\uD83D\uDD0A \u05E6\u05DC\u05D9\u05DC: \u05E4\u05D5\u05E2\u05DC':'\uD83D\uDD07 \u05E6\u05DC\u05D9\u05DC: \u05DB\u05D1\u05D5\u05D9';
}

const MELS=[[264,330,396,440,396,330,264,220],[220,277,330,369,330,277,220,185],[523,659,784,880,784,659,523,440],[293,349,415,466,415,349,293,247],[349,440,523,587,523,440,349,294],[196,247,294,330,294,247,196,165],[440,554,659,740,659,554,440,370]];

function playBg(idx){
  stopBg();
  if(!audioCtx||!soundEnabled)return;
  const g=audioCtx.createGain();
  g.gain.setValueAtTime(0,audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(1,audioCtx.currentTime+2.5);
  g.connect(masterGain);
  const mel=MELS[idx%MELS.length]; const nodes=[]; let alive=true;
  function loop(st){
    if(!alive)return;
    mel.forEach((f,i)=>{
      const t=st+i*1.25;
      const o=audioCtx.createOscillator(),gn=audioCtx.createGain();
      o.type='sine'; o.frequency.value=f;
      gn.gain.setValueAtTime(0,t); gn.gain.linearRampToValueAtTime(0.06,t+0.18);
      gn.gain.setValueAtTime(0.06,t+0.85); gn.gain.linearRampToValueAtTime(0,t+1.22);
      o.connect(gn); gn.connect(g); o.start(t); o.stop(t+1.25); nodes.push(o);
    });
    setTimeout(()=>{if(alive)loop(audioCtx.currentTime);},mel.length*1.25*1000+2000);
  }
  loop(audioCtx.currentTime+0.5);
  const b=audioCtx.createOscillator(),bg2=audioCtx.createGain();
  b.type='sine'; b.frequency.value=mel[0]/2; bg2.gain.value=0.016;
  b.connect(bg2); bg2.connect(g); b.start(); nodes.push(b);
  bgNodes=nodes; bgGain=g; bgGain._kill=()=>{alive=false;};
}
function stopBg(){
  if(bgGain){try{bgGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1);}catch(e){} if(bgGain._kill)bgGain._kill();}
  const n=bgNodes; setTimeout(()=>n.forEach(x=>{try{x.stop();}catch(e){}}),1100);
  bgNodes=[]; bgGain=null;
}
function sfx(t2){
  if(!audioCtx||!soundEnabled)return;
  const t=audioCtx.currentTime;
  if(t2==='step'){const b=audioCtx.createBuffer(1,Math.floor(audioCtx.sampleRate*.05),audioCtx.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length)*.35;const s=audioCtx.createBufferSource(),g=audioCtx.createGain();g.gain.value=.05;s.buffer=b;s.connect(g);g.connect(masterGain);s.start();}
  else if(t2==='portal'){[300,600,1200,2400].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.09,t+i*.07);g.gain.linearRampToValueAtTime(0,t+i*.07+.5);o.connect(g);g.connect(masterGain);o.start(t+i*.07);o.stop(t+i*.07+.6);});}
  else if(t2==='win'){[523,659,784,1046,1318].forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.1,t+i*.09);g.gain.linearRampToValueAtTime(0,t+i*.09+.5);o.connect(g);g.connect(masterGain);o.start(t+i*.09);o.stop(t+i*.09+.6);});}
  else if(t2==='fail'){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(350,t);o.frequency.linearRampToValueAtTime(180,t+.4);g.gain.setValueAtTime(.08,t);g.gain.linearRampToValueAtTime(0,t+.45);o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.5);}
  else if(t2==='click'){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.linearRampToValueAtTime(900,t+.08);g.gain.setValueAtTime(.06,t);g.gain.linearRampToValueAtTime(0,t+.12);o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+.15);}
}

// ══ TTS via Google Cloud ══
const GKEY='AIzaSyAm2OQurmH_lzFJioj2qALN7CJh3a34sUE';
const HE_VOICES=['he-IL-Standard-A','he-IL-Standard-B','he-IL-Standard-C','he-IL-Standard-D','he-IL-Standard-A','he-IL-Standard-B','he-IL-Standard-C','he-IL-Standard-D'];
const PITCH_CFG=[-4.0,4.0,-1.0,2.0,1.0,-3.0,3.0,0.0];
const RATE_CFG=[0.78,1.0,0.82,0.72,0.70,0.80,0.90,0.78];
let currentAudio=null, dialogReady=false;

async function speakAndWait(text,vi,onDone){
  if(!soundEnabled){if(onDone)setTimeout(onDone,500);return;}
  stopSpeech(); showInd(true);
  try{
    const res=await fetch('https://texttospeech.googleapis.com/v1/text:synthesize?key='+GKEY,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({input:{text},voice:{languageCode:'he-IL',name:HE_VOICES[vi||0]},audioConfig:{audioEncoding:'MP3',pitch:PITCH_CFG[vi||0],speakingRate:RATE_CFG[vi||0]}})
    });
    const data=await res.json();
    if(data.audioContent){
      const audio=new Audio('data:audio/mp3;base64,'+data.audioContent);
      currentAudio=audio;
      audio.onended=()=>{showInd(false);currentAudio=null;if(onDone)onDone();};
      audio.onerror=()=>{showInd(false);currentAudio=null;if(onDone)onDone();};
      audio.play();
    } else {showInd(false);if(onDone)setTimeout(onDone,Math.max(2000,text.length*60));}
  }catch(e){showInd(false);if(onDone)setTimeout(onDone,Math.max(2000,text.length*60));}
}
function stopSpeech(){
  if(currentAudio){try{currentAudio.pause();}catch(e){}currentAudio=null;}
  showInd(false);
}
function showInd(v){const el=document.getElementById('dlg-ind');if(el)el.style.display=v?'flex':'none';}

function narrate(text,dur){
  dur=dur||Math.max(5000,text.length*80);
  const el=document.getElementById('narrator');
  document.getElementById('narrator-text').textContent=text;
  el.style.display='block';
  speakAndWait(text,7,()=>{});
  setTimeout(()=>el.style.display='none',dur);
}

// ══ WORLDS ══
const WORLDS=[
  {name:'עולם הענן הכחול',sky:0x0a1535,ground:0x1a2a6e,fog:0x0d1540,amb:0x1a2880,nc:0x88ccff,sc:0xaaddff,hasTrees:true,hasSea:false,hasBirds:true,hasSnow:false,hasLava:false,
   story:'לונה נכנסת לעולם הענן הכחול. ערפל כסוף מכסה הכל, וקולות עתיקים מהדהדים בין הכוכבים...'},
  {name:'יערות הפיות הבוערים',sky:0x180800,ground:0x2d1500,fog:0x3a1000,amb:0x6b2a00,nc:0xff9944,sc:0xff6600,hasTrees:true,hasSea:false,hasBirds:false,hasSnow:false,hasLava:true,
   story:'שלהבות כתומות מאירות יער עתיק. פיה שובבה מחכה לאתגר את לונה בחידות הטבע...'},
  {name:'ממלכת הקריסטלים',sky:0x001525,ground:0x002a44,fog:0x001828,amb:0x005580,nc:0x44aaff,sc:0x88ddff,hasTrees:false,hasSea:true,hasBirds:true,hasSnow:false,hasLava:false,
   story:'גבישים ענקיים מנצנצים כמו כוכבים. מלך הקריסטל שומר על סודות הים העמוק...'},
  {name:'ארץ השעונים',sky:0x100820,ground:0x1e1030,fog:0x140a28,amb:0x3a1060,nc:0xdd88ff,sc:0xcc88ff,hasTrees:false,hasSea:false,hasBirds:false,hasSnow:false,hasLava:false,

  const belly=new THREE.Mesh(new THREE.SphereGeometry(0.23,8,6),std(0xffeeff,0,0,0.5));

  const head=new THREE.Mesh(new THREE.SphereGeometry(0.22,14,12),std(0xfff8ff,0xfff0ff,0.05,0.5));

  // Snout
  const snout=new THREE.Mesh(new THREE.SphereGeometry(0.13,8,6),std(0xffeee8,0,0,0.5));

  // Nostrils
  [-0.05,0.05].forEach(x=>{
    const n=new THREE.Mesh(new THREE.SphereGeometry(0.025,4,4),std(0xffaabb,0,0,0.4));
    n.position.set(x,1.27,0.54); g.add(n);

  // Eyes
  [-0.1,0.1].forEach(x=>{
    const ew=new THREE.Mesh(new THREE.SphereGeometry(0.06,10,10),std(0x8833ff,0x6600cc,0.5,0.3));

    const shine=new THREE.Mesh(new THREE.SphereGeometry(0.012,4,4),std(0xffffff,0xffffff,0.5,0.1));
    shine.position.set(x+0.02,1.42,0.52); g.add(shine);
  });
  // Horn
  const horn=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.58,8),std(0xffd700,0xffaa00,0.8,0.1,0.6));
  horn.position.set(0,1.68,0.28); horn.rotation.x=0.3; g.add(horn);
  // Horn glow
  const hg=new THREE.Mesh(new THREE.ConeGeometry(0.09,0.65,8),new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffaa00,emissiveIntensity:0.4,transparent:true,opacity:0.3,roughness:0.8}));
  hg.position.copy(horn.position); hg.rotation.copy(horn.rotation); g.add(hg);
  // Ears
  [-0.15,0.15].forEach((x,i)=>{
    const ear=new THREE.Mesh(new THREE.ConeGeometry(0.06,0.19,6),std(0xfff4ff,0,0,0.6));
    ear.position.set(x,1.6,0.2); ear.rotation.z=x>0?0.4:-0.4; g.add(ear);
    const earIn=new THREE.Mesh(new THREE.ConeGeometry(0.03,0.13,4),std(0xffccdd,0xff88aa,0.3,0.4));
    earIn.position.copy(ear.position); earIn.rotation.copy(ear.rotation); g.add(earIn);
  });
  // Mane
  const maneC=[0xff88cc,0xcc66ff,0x88ccff,0xff99dd,0xaa88ff];
  [[-0.08,1.55,0.04],[0.08,1.5,0.01],[0,1.44,-0.06],[-0.06,1.3,-0.09],[0.06,1.2,-0.11]].forEach(([x,y,z],i)=>{
    const m=new THREE.Mesh(new THREE.SphereGeometry(0.1+i*0.01,8,6),std(maneC[i],maneC[i],0.3,0.6));

  });

  [[-0.18,0,0.18],[0.18,0,0.18],[-0.16,0,-0.18],[0.16,0,-0.18]].forEach(([x,,z])=>{

  [[0,0.55,0.02],[0.05,0.42,-0.06],[-0.05,0.3,-0.1]].forEach(([x,y,z],i)=>{

  aura.position.y=0.65; g.add(aura);
  g.userData={hornGlow:hg,aura};
  return g;
}

    const tail=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.02,1.2,6),npcMat); tail.position.set(0,.5,.62); tail.rotation.x=.7; g.add(tail);

    const head=new THREE.Mesh(new THREE.SphereGeometry(0.2,12,12),skin); head.position.y=1.62; g.add(head);
    [-1,1].forEach(s=>{const w=new THREE.Mesh(new THREE.ConeGeometry(0.45,.72,4),mat(0xffcc88,.3,.8)); w.position.set(s*.42,1.32,0); w.rotation.z=s*.5; w.rotation.x=-.3; g.add(w);});
    const hair=new THREE.Mesh(new THREE.SphereGeometry(0.22,8,8),mat(0xff4400,.2,.6)); hair.position.y=1.72; hair.scale.set(1,.6,1); g.add(hair);
    [-0.1,0.1].forEach(x=>{
      const ew=new THREE.Mesh(new THREE.SphereGeometry(0.06,8,8),white); ew.position.set(x,1.64,.17); g.add(ew);
      const ep=new THREE.Mesh(new THREE.SphereGeometry(0.035,6,6),black); ep.position.set(x,1.64,.21); g.add(ep);

    const star=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8),mat(0xffff00,.8,.1)); star.position.set(.72,1.57,0); g.add(star);
  } else if(nd.world===2){
    const robe=new THREE.Mesh(new THREE.CylinderGeometry(.44,.62,1.4,10),npcMat); robe.position.y=.7; robe.castShadow=true; g.add(robe);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.3,14,12),skin); head.position.y=1.62; g.add(head);
    const crown=new THREE.Mesh(new THREE.CylinderGeometry(.22,.3,.25,6),mat(0xffd700,.5,.1,.8)); crown.position.y=1.97; g.add(crown);
    for(let i=0;i<6;i++){const sp=new THREE.Mesh(new THREE.ConeGeometry(.04,.22,4),mat(0xffd700,.7,.1,.8)); sp.position.set(Math.cos(i/6*Math.PI*2)*.22,2.17,Math.sin(i/6*Math.PI*2)*.22); g.add(sp);}
    [-0.12,0.12].forEach(x=>{
      const ew=new THREE.Mesh(new THREE.SphereGeometry(.08,8,8),white); ew.position.set(x,1.64,.26); g.add(ew);
      const ep=new THREE.Mesh(new THREE.SphereGeometry(.045,6,6),black); ep.position.set(x,1.64,.32); g.add(ep);
    });
    const scepter=new THREE.Mesh(new THREE.CylinderGeometry(.04,.04,1.05,6),mat(0x88ccff,.2,.3)); scepter.position.set(.62,1.02,0); g.add(scepter);
    const cr=new THREE.Mesh(new THREE.ConeGeometry(.12,.36,5),mat(0x44aaff,.5,.2)); cr.position.set(.62,1.64,0); g.add(cr);
  } else if(nd.world===3){
    const body=new THREE.Mesh(new THREE.CylinderGeometry(.52,.52,.26,12),npcMat); body.position.y=1.32; g.add(body);
    const face=new THREE.Mesh(new THREE.CircleGeometry(.5,12),mat(0xfff8e0,0,.3)); face.position.set(0,1.32,.14); g.add(face);
    for(let i=0;i<12;i++){const d=new THREE.Mesh(new THREE.SphereGeometry(.035,4,4),black); d.position.set(Math.sin(i/12*Math.PI*2)*.4,1.32+Math.cos(i/12*Math.PI*2)*.4,.16); g.add(d);}
    [-0.3,0.3].forEach(x=>{const leg=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,.92,6),npcMat); leg.position.set(x,.66,0); g.add(leg);});
    [-0.13,0.13].forEach(x=>{const ew=new THREE.Mesh(new THREE.SphereGeometry(.065,8,8),mat(0xffcc00,.5,.2)); ew.position.set(x,1.4,.19); g.add(ew);});
  } else if(nd.world===4){
    const body=new THREE.Mesh(new THREE.CylinderGeometry(.38,.46,1.4,8),npcMat); body.position.y=.8; body.castShadow=true; g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.28,14,12),mat(0xdd6633,.2,.6)); head.position.y=1.68; g.add(head);
    [-1,1].forEach(s=>{const w=new THREE.Mesh(new THREE.ConeGeometry(.44,1.0,4),dark); w.position.set(s*.65,1.15,0); w.rotation.z=s*.65; g.add(w);});
    const tail=new THREE.Mesh(new THREE.CylinderGeometry(.07,.02,1.1,6),npcMat); tail.position.set(0,.45,.58); tail.rotation.x=.7; g.add(tail);
    [-0.14,0.14].forEach(x=>{const ew=new THREE.Mesh(new THREE.SphereGeometry(.07,8,8),mat(0xff4400,.6,.2)); ew.position.set(x,1.72,.22); g.add(ew);});
  } else if(nd.world===5){
    const body=new THREE.Mesh(new THREE.CylinderGeometry(.4,.48,1.35,10),npcMat); body.position.y=.78; body.castShadow=true; g.add(body);
    const head=new THREE.Mesh(new THREE.SphereGeometry(.28,14,12),skin); head.position.y=1.65; g.add(head);
    const crown=new THREE.Mesh(new THREE.CylinderGeometry(.2,.28,.22,8),mat(0xaaddff,.4,.2)); crown.position.y=1.96; g.add(crown);
    [-0.12,0.12].forEach(x=>{
      const ew=new THREE.Mesh(new THREE.SphereGeometry(.075,8,8),white); ew.position.set(x,1.68,.24); g.add(ew);
      const ep=new THREE.Mesh(new THREE.SphereGeometry(.042,6,6),black); ep.position.set(x,1.68,.3); g.add(ep);
    });
  } else {
    const stem=new THREE.Mesh(new THREE.CylinderGeometry(.1,.12,1.85,8),mat(0x22aa44,.1,.7)); stem.position.y=.92; g.add(stem);
    for(let i=0;i<8;i++){const p=new THREE.Mesh(new THREE.SphereGeometry(.36,10,7),mat(i%2===0?0xff88cc:0xffcc44,i%2===0?.3:.4,.6)); p.position.set(Math.cos(i/8*Math.PI*2)*.56,1.97,Math.sin(i/8*Math.PI*2)*.56); p.scale.set(1,.5,1); g.add(p);}
    const center=new THREE.Mesh(new THREE.SphereGeometry(.38,14,12),mat(0xffdd00,.4,.4)); center.position.y=1.97; g.add(center);
    [-0.13,0.13].forEach(x=>{
      const ew=new THREE.Mesh(new THREE.SphereGeometry(.07,8,8),white); ew.position.set(x,2.02,.36); g.add(ew);
      const ep=new THREE.Mesh(new THREE.SphereGeometry(.04,6,6),black); ep.position.set(x,2.02,.41); g.add(ep);
    });
  }

  const glow=new THREE.Mesh(new THREE.SphereGeometry(.95,8,8),new THREE.MeshStandardMaterial({color:nd.color,emissive:new THREE.Color(nd.color),emissiveIntensity:.12,transparent:true,opacity:.1,roughness:1}));
  glow.position.y=1.0; g.add(glow);
  g.userData={npc:nd,glow};
  return g;
}

// ══ WORLD BUILDING ══
function makeDetailedTree(x,z,col,col2,wi){
  const g=new THREE.Group();
  const th=1.5+Math.random();
  const tr=0.12+Math.random()*.08;
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(tr*.6,tr,th,7),
    new THREE.MeshStandardMaterial({color:wi===1?0x442200:wi===5?0xccddee:0x5c3d1e,roughness:.9}));
  trunk.position.y=th/2; trunk.castShadow=true; g.add(trunk);
  const layers=3+Math.floor(Math.random()*2);
  for(let i=0;i<layers;i++){
    const r=1.4-i*.28+Math.random()*.2;
    const leaves=new THREE.Mesh(new THREE.ConeGeometry(r,1.1+Math.random()*.3,8),
      new THREE.MeshStandardMaterial({color:i%2===0?col:col2,roughness:.8}));
    leaves.position.y=th+i*.72; leaves.castShadow=true; g.add(leaves);
  }
  if(wi===6){
    for(let i=0;i<5;i++){
      const fl=new THREE.Mesh(new THREE.SphereGeometry(.1,6,6),
        new THREE.MeshStandardMaterial({color:0xff88cc,emissive:0xff44aa,emissiveIntensity:.5}));
      fl.position.set((Math.random()-.5)*1.5,th+Math.random()*1.5,(Math.random()-.5)*1.5);
      g.add(fl);
    }
  }
  if(wi===5){
    const snow=new THREE.Mesh(new THREE.ConeGeometry(1.5,0.4,8),
      new THREE.MeshStandardMaterial({color:0xeeeeff,roughness:.9,metalness:0.1}));
    snow.position.y=th+0.2; g.add(snow);
  }
  g.position.set(x,0,z); g.rotation.y=Math.random()*Math.PI*2;
  return g;
}

function makeBird(col){
  const g=new THREE.Group();
  const mat=new THREE.MeshStandardMaterial({color:col||0xffffff,roughness:.7});
  const b=new THREE.Mesh(new THREE.SphereGeometry(.07,8,8),mat);
  const wL=new THREE.Mesh(new THREE.BoxGeometry(.18,.02,.08),mat);
  const wR=new THREE.Mesh(new THREE.BoxGeometry(.18,.02,.08),mat);
  wL.position.set(-.12,0,0); wR.position.set(.12,0,0);
  g.add(b); g.add(wL); g.add(wR);
  g.userData.wL=wL; g.userData.wR=wR;
  return g;
}

function build(idx){
  const w=WORLDS[idx];
  scene.background=new THREE.Color(w.sky);
  scene.fog=new THREE.FogExp2(w.fog,.025);
  worldObjs.forEach(o=>scene.remove(o));
  worldObjs=[]; npcList=[]; floaters=[]; birds=[]; portals=[];

  // Lights
  const al=new THREE.AmbientLight(w.amb,1.2); scene.add(al); worldObjs.push(al);
  const dl=new THREE.DirectionalLight(w.sc||0xffeedd,1.3);
  dl.position.set(25,40,15); dl.castShadow=true;
  dl.shadow.mapSize.set(2048,2048); dl.shadow.camera.far=150;
  dl.shadow.camera.left=-60; dl.shadow.camera.right=60;
  dl.shadow.camera.top=60; dl.shadow.camera.bottom=-60;
  scene.add(dl); worldObjs.push(dl);
  const rl=new THREE.DirectionalLight(new THREE.Color(w.nc),0.35);
  rl.position.set(-20,10,-15); scene.add(rl); worldObjs.push(rl);
  // Point lights
  const pl1=new THREE.PointLight(w.nc,2.0,30); pl1.position.set(5,5,-6); scene.add(pl1); worldObjs.push(pl1);
  const pl2=new THREE.PointLight(w.nc,1.2,22); pl2.position.set(-7,4,5); scene.add(pl2); worldObjs.push(pl2);

  // Sky dome
  const skyGeo=new THREE.SphereGeometry(200,16,8);
  const skyMat=new THREE.MeshBasicMaterial({color:w.sky,side:THREE.BackSide});
  const sky=new THREE.Mesh(skyGeo,skyMat); scene.add(sky); worldObjs.push(sky);

  // Stars
  if(idx===0||idx===3||idx===5||idx===6){
    const sg=new THREE.BufferGeometry(), sp=[];
    for(let i=0;i<600;i++){
      const t=Math.random()*Math.PI*2, p=Math.random()*Math.PI*.5;
      const r=150+Math.random()*20;
      sp.push(r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
    }
    sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
    const stars=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:.5,sizeAttenuation:true}));
    scene.add(stars); worldObjs.push(stars);
  }

  // Moon/Sun
  const cel=new THREE.Mesh(new THREE.SphereGeometry(idx===1?4:2.5,16,16),
    new THREE.MeshBasicMaterial({color:idx===1?0xff8800:idx===5?0xddeeff:0xffeeff}));
  cel.position.set(idx===1?35:25,42,idx===1?-25:-35);
  const celG=new THREE.Mesh(new THREE.SphereGeometry(idx===1?6:3.8,16,16),
    new THREE.MeshBasicMaterial({color:idx===1?0xff6600:0xffeeff,transparent:true,opacity:0.12}));
  celG.position.copy(cel.position);
  scene.add(cel); scene.add(celG); worldObjs.push(cel,celG);

  // Clouds
  if(idx===0||idx===5||idx===6){
    for(let i=0;i<10;i++){
      const cloud=new THREE.Group();
      const cc=idx===5?0xeeeeff:0xdde8ff;
      [0,1.2,-1.0,0.6,-0.5,1.8].forEach((x,j)=>{
        const r=1.0+Math.random()*.9;
        const sp=new THREE.Mesh(new THREE.SphereGeometry(r,10,8),
          new THREE.MeshStandardMaterial({color:cc,roughness:.9,transparent:true,opacity:0.88}));
        sp.position.set(x*2.2,Math.random()*.6,j*.6-1.5);
        cloud.add(sp);
      });
      cloud.position.set((Math.random()-.5)*70,18+Math.random()*12,(Math.random()-.5)*70);
      cloud.userData.isCloud=true;
      scene.add(cloud); worldObjs.push(cloud); floaters.push(cloud);
    }
  }

  // Ground — large with detail
  const gr=new THREE.Mesh(new THREE.PlaneGeometry(150,150,30,30),
    new THREE.MeshStandardMaterial({color:w.ground,roughness:.9,metalness:0}));
  gr.rotation.x=-Math.PI/2; gr.receiveShadow=true; scene.add(gr); worldObjs.push(gr);

  // Snow ground overlay
  if(w.hasSnow){
    const snow=new THREE.Mesh(new THREE.PlaneGeometry(150,150),
      new THREE.MeshStandardMaterial({color:0xeeeeff,roughness:.95,metalness:.05,transparent:true,opacity:.85}));
    snow.rotation.x=-Math.PI/2; snow.position.y=.02; scene.add(snow); worldObjs.push(snow);
  }

  // Rocks
  for(let i=0;i<40;i++){
    const r=Math.random()*.5+.12;
    const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(r,0),
      new THREE.MeshStandardMaterial({color:new THREE.Color(w.ground).offsetHSL(0,0,Math.random()*.2-.05),roughness:.95}));
    const rx=(Math.random()-.5)*55,rz=(Math.random()-.5)*55;
    if(Math.abs(rx)<9&&Math.abs(rz)<11)continue;
    rock.position.set(rx,r*.5,rz); rock.rotation.set(Math.random(),Math.random(),Math.random());
    rock.castShadow=true; rock.receiveShadow=true;
    scene.add(rock); worldObjs.push(rock);
  }

  // Sea
  if(w.hasSea){
    const seaGeo=new THREE.PlaneGeometry(50,25,16,16);
    const sea=new THREE.Mesh(seaGeo,
      new THREE.MeshStandardMaterial({color:idx===6?0x00ccdd:idx===5?0x4488aa:0x1166cc,
        roughness:.1,metalness:.3,transparent:true,opacity:.82}));
    sea.rotation.x=-Math.PI/2; sea.position.set(-18,.04,-22);
    sea.userData.isSea=true; scene.add(sea); worldObjs.push(sea); floaters.push(sea);
    const shore=new THREE.Mesh(new THREE.PlaneGeometry(52,2),
      new THREE.MeshStandardMaterial({color:0xddeeff,roughness:.8,transparent:true,opacity:.7}));
    shore.rotation.x=-Math.PI/2; shore.position.set(-18,.05,-9.5);
    scene.add(shore); worldObjs.push(shore);
  }

  // Structures
  for(let i=0;i<16;i++){
    const h=Math.random()*7+2;
    const type=Math.floor(Math.random()*3);
    let geo;
    if(type===0)geo=new THREE.BoxGeometry(1.4+Math.random()*.8,h,1.4+Math.random()*.8);
    else if(type===1)geo=new THREE.CylinderGeometry(.4+Math.random()*.3,.55+Math.random()*.3,h,7);
    else geo=new THREE.ConeGeometry(1.0+Math.random()*.6,h,6);
    const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:new THREE.Color(w.ground).offsetHSL(0,0,Math.random()*.28),roughness:.85}));
    const rx=(Math.random()-.5)*52,rz=(Math.random()-.5)*52;
    if(Math.abs(rx)<10&&Math.abs(rz)<12)continue;
    m.position.set(rx,h/2,rz); m.castShadow=true; m.receiveShadow=true;
    scene.add(m); worldObjs.push(m);
  }

  // Crystals
  if(idx===2||idx===5){
    const cCol=idx===5?0xaaddff:0x66ccff;
    for(let i=0;i<18;i++){
      const h=Math.random()*5+2;
      const sides=Math.floor(Math.random()*3)+4;
      const cr=new THREE.Mesh(new THREE.CylinderGeometry(0,0.32,h,sides),
        new THREE.MeshStandardMaterial({color:cCol,transparent:true,opacity:.8,roughness:.1,metalness:.5,emissive:cCol,emissiveIntensity:.2}));
      const rx=(Math.random()-.5)*42,rz=(Math.random()-.5)*42;
      if(Math.abs(rx)<10&&Math.abs(rz)<12)continue;
      cr.position.set(rx,h/2,rz); cr.castShadow=true;
      scene.add(cr); worldObjs.push(cr);
    }
  }

  // Lava streams
  if(w.hasLava){
    for(let i=0;i<6;i++){
      const lava=new THREE.Mesh(new THREE.PlaneGeometry(2+Math.random()*3,8+Math.random()*5),
        new THREE.MeshStandardMaterial({color:0xff3300,emissive:0xff2200,emissiveIntensity:.8,roughness:.4}));
      lava.rotation.x=-Math.PI/2;
      const lx=(Math.random()-.5)*40,lz=(Math.random()-.5)*40;
      if(Math.abs(lx)<12&&Math.abs(lz)<14)continue;
      lava.position.set(lx,.03,lz);
      scene.add(lava); worldObjs.push(lava); floaters.push(lava);
      lava.userData.isLava=true;
    }
  }

  // Gears
  if(idx===3){
    for(let i=0;i<10;i++){
      const r=1.0+Math.random()*2.2;
      const gear=new THREE.Mesh(new THREE.CylinderGeometry(r,r,.42,Math.floor(8+r*4)),
        new THREE.MeshStandardMaterial({color:0x998877,emissive:0x554433,emissiveIntensity:.3,roughness:.6,metalness:.5}));
      gear.position.set((Math.random()-.5)*26,r+Math.random()*2.5,(Math.random()-.5)*26);
      gear.userData.isGear=true; gear.userData.gs=(Math.random()>.5?1:-1)*(.15+Math.random()*.4);
      gear.castShadow=true; scene.add(gear); worldObjs.push(gear); floaters.push(gear);
      const bolt=new THREE.Mesh(new THREE.CylinderGeometry(.16,.16,.6,8),
        new THREE.MeshStandardMaterial({color:0xffdd88,emissive:0xffaa00,emissiveIntensity:.4,roughness:.2,metalness:.8}));
      bolt.position.copy(gear.position); scene.add(bolt); worldObjs.push(bolt);
    }
  }

  // Trees
  if(w.hasTrees){
    const tc=idx===6?0x33bb33:idx===1?0xcc4400:idx===5?0xaabbcc:0x1a6622;
    const tc2=idx===6?0x228811:idx===1?0xaa3300:idx===5?0x8899aa:0x0f4415;
    for(let i=0;i<24;i++){
      const tx=(Math.random()-.5)*55,tz=(Math.random()-.5)*55;
      if(Math.abs(tx)<10&&Math.abs(tz)<12)continue;
      const t=makeDetailedTree(tx,tz,tc,tc2,idx);
      scene.add(t); worldObjs.push(t);
    }
  }

  // Magic particles / orbs
  for(let i=0;i<15;i++){
    const r=Math.random()*.2+.07;
    const c=new THREE.Color(w.nc);
    const orb=new THREE.Mesh(new THREE.SphereGeometry(r,10,10),
      new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:.9,roughness:.1}));
    orb.position.set((Math.random()-.5)*28,r+Math.random()*5,(Math.random()-.5)*28);
    scene.add(orb); worldObjs.push(orb);
    const gl=new THREE.Mesh(new THREE.SphereGeometry(r*2.8,8,8),
      new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:.3,transparent:true,opacity:.1,roughness:1}));
    gl.position.copy(orb.position); scene.add(gl); worldObjs.push(gl);
    orb.userData.glow=gl; floaters.push(orb);
  }

  // Birds
  if(w.hasBirds){
    const bc=idx===5?0xddeeff:idx===6?0xffeeaa:0xffffff;
    for(let i=0;i<10;i++){
      const b=makeBird(bc);
      b.position.set((Math.random()-.5)*35,5+Math.random()*7,(Math.random()-.5)*35);
      b.userData.speed=.35+Math.random()*.4;
      b.userData.dir=Math.random()*Math.PI*2;
      b.userData.fp=Math.random()*Math.PI*2;
      scene.add(b); worldObjs.push(b); birds.push(b);
    }
  }

  // Eden particles
  if(idx===6){
    for(let i=0;i<25;i++){
      const p=new THREE.Mesh(new THREE.SphereGeometry(.06,4,4),
        new THREE.MeshBasicMaterial({color:0xffeeaa}));
      p.position.set((Math.random()-.5)*22,Math.random()*6,(Math.random()-.5)*22);
      p.userData.isParticle=true; p.userData.ph=Math.random()*Math.PI*2;
      scene.add(p); worldObjs.push(p); floaters.push(p);
    }
  }

  // NPCs
  NPCS.filter(n=>n.world===idx).forEach(nd=>{
    const g=buildNPC(nd);
    g.position.set(...nd.pos);
    scene.add(g); worldObjs.push(g); npcList.push(g);
  });

  // 3 Portals per world (1 real, 2 fake)
  const nextW=WORLDS[(idx+1)%WORLDS.length];
  const portalPositions=[
    {x:0,z:-18,real:true},
    {x:14,z:-12,real:false},
    {x:-14,z:-12,real:false},
  ];
  portalPositions.forEach(pp=>{
    const pc=pp.real?new THREE.Color(nextW.nc):new THREE.Color(0xff4444);
    const portal=new THREE.Mesh(new THREE.TorusGeometry(1.7,.17,14,44),
      new THREE.MeshStandardMaterial({color:pc,emissive:pc,emissiveIntensity:pp.real?1.0:.5,roughness:.2,metalness:.3}));
    portal.position.set(pp.x,1.7,pp.z);
    const pInner=new THREE.Mesh(new THREE.CircleGeometry(1.53,32),
      new THREE.MeshStandardMaterial({color:pp.real?new THREE.Color(nextW.sky):0x330000,transparent:true,opacity:.65,roughness:1}));
    pInner.position.set(pp.x,1.7,pp.z-.01);
    // Label
    portal.userData={isPortal:true,isReal:pp.real};
    scene.add(portal); scene.add(pInner);
    worldObjs.push(portal,pInner); portals.push(portal);
    // Portal light
    const pl=new THREE.PointLight(pp.real?new THREE.Color(nextW.nc).getHex():0xff4444,1.5,8);
    pl.position.set(pp.x,1.7,pp.z); scene.add(pl); worldObjs.push(pl);
  });

  // Luna
  if(lunaMesh)scene.remove(lunaMesh);
  lunaMesh=buildLuna();
  lunaMesh.position.set(0,0,4);
  lunaAngle=Math.PI;
  scene.add(lunaMesh);

  // Update HUD
  document.getElementById('wname').textContent=w.name;
  // Map dots
  const md=document.getElementById('map-dots'); md.innerHTML='';
  for(let i=0;i<WORLDS.length;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<idx?' v':i===idx?' c':'');
    md.appendChild(d);
  }

  if(audioCtx&&soundEnabled)playBg(idx);
  setTimeout(()=>narrate(w.story),1200);
}

// ══ PUZZLES ══
function buildPuzzle(pz,onWin){
  const area=document.getElementById('pz-area'); area.innerHTML='';

  if(pz.type==='q'){
    setTimeout(()=>speakAndWait(pz.desc,curNPC?curNPC.vi:7,()=>{}),300);
    pz.opts.forEach((o,i)=>{
      const b=document.createElement('button'); b.className='q-btn';
      b.textContent=o;
      b.onclick=()=>{
        if(i===pz.cor){sfx('win');winPuzzle(pz,onWin);}
        else{sfx('fail');
          document.getElementById('pz-fb').textContent='לא נכון, נסי שוב!';
          document.getElementById('pz-fb').className='fail';
          mp_val=Math.max(10,mp_val-8); updateHUD();
        }
      };
      area.appendChild(b);
    });

  } else if(pz.type==='sequence'){
    speakAndWait(pz.desc,curNPC?curNPC.vi:7,()=>{});
    pz.opts.forEach((o,i)=>{
      const b=document.createElement('button'); b.className='q-btn';
      b.textContent=o;
      b.onclick=()=>{
        if(i===pz.cor){sfx('win');winPuzzle(pz,onWin);}
        else{sfx('fail');
          document.getElementById('pz-fb').textContent='לא נכון! נסי שוב...';
          document.getElementById('pz-fb').className='fail';
          mp_val=Math.max(10,mp_val-8); updateHUD();
        }
      };
      area.appendChild(b);
    });

  } else if(pz.type==='pattern'){
    const inst=document.createElement('div');
    inst.style.cssText='font-size:14px;color:#c39bd3;margin-bottom:12px;';
    inst.innerHTML=pz.desc; area.appendChild(inst);
    const row=document.createElement('div'); row.style.textAlign='center';
    pz.opts.forEach((o,i)=>{
      const b=document.createElement('button'); b.className='q-btn';
      b.innerHTML=o;
      b.onclick=()=>{
        if(i===pz.cor){sfx('win');winPuzzle(pz,onWin);}
        else{sfx('fail');
          document.getElementById('pz-fb').textContent='לא נכון! נסי שוב...';
          document.getElementById('pz-fb').className='fail';
        }
      };
      row.appendChild(b);
    });
    area.appendChild(row);

  } else if(pz.type==='chain'){
    const inst=document.createElement('div');
    inst.style.cssText='font-size:13px;color:#c39bd3;margin-bottom:12px;line-height:1.5;';
    inst.innerHTML='<b style="color:#f8c8ff">'+pz.desc+'</b><br>סדרי את הפריטים משמאל לימין (לחצי לבחור ואז על החריץ):';
    area.appendChild(inst);

    const slots=new Array(pz.items.length).fill(null);
    let sel=null;
    const slotEls=[];

    const slotRow=document.createElement('div'); slotRow.style.cssText='display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;';
    for(let i=0;i<pz.items.length;i++){
      const s=document.createElement('div');
      s.style.cssText='width:72px;height:72px;border:2px dashed #9b59b6;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(155,89,182,.1);cursor:pointer;font-size:12px;color:#9b59b6;text-align:center;';
      s.textContent=(i+1)+'';
      s.onclick=()=>{
        if(sel===null)return;
        if(slots[i]!==null)return;
        slots[i]=sel;
        s.textContent=pz.items[sel];
        s.style.borderColor='#5dcaa5'; s.style.background='rgba(93,202,165,.2)'; s.style.color='white'; s.style.fontSize='13px';
        document.querySelector('[data-ci="'+sel+'"]').style.opacity='.3';
        document.querySelector('[data-ci="'+sel+'"]').style.pointerEvents='none';
        sel=null; document.querySelectorAll('.chain-item').forEach(c=>c.style.boxShadow='none');
        sfx('click');
        if(slots.every(v=>v!==null)){
          const ok=slots.every((v,j)=>v===pz.correct[j]);
          if(ok){sfx('win');winPuzzle(pz,onWin);}
          else{sfx('fail');
            document.getElementById('pz-fb').textContent='לא נכון! הסדר צריך להיות: '+pz.correct.map(j=>pz.items[j]).join(' → ');
            document.getElementById('pz-fb').className='fail';
            slots.fill(null);
            slotEls.forEach((s,i)=>{s.textContent=(i+1)+'';s.style.borderColor='#9b59b6';s.style.background='rgba(155,89,182,.1)';s.style.color='#9b59b6';s.style.fontSize='12px';s.style.borderStyle='dashed';});
            document.querySelectorAll('.chain-item').forEach(c=>{c.style.opacity='1';c.style.pointerEvents='auto';c.style.boxShadow='none';});
          }
        }
      };
      slotEls.push(s); slotRow.appendChild(s);
    }
    area.appendChild(slotRow);

    const itemRow=document.createElement('div'); itemRow.style.cssText='display:flex;gap:8px;justify-content:center;flex-wrap:wrap;';
    pz.items.forEach((item,i)=>{
      const b=document.createElement('div'); b.className='chain-item';
      b.style.cssText='padding:10px 14px;background:rgba(155,89,182,.25);border:2px solid #9b59b6;border-radius:8px;cursor:pointer;color:#f0e8ff;font-size:14px;transition:all .2s;';
      b.textContent=item; b.dataset.ci=i;
      b.onclick=()=>{
        if(b.style.opacity==='0.3')return;
        document.querySelectorAll('.chain-item').forEach(c=>c.style.boxShadow='none');
        sel=i; b.style.boxShadow='0 0 12px #5dcaa5'; sfx('click');
      };
      itemRow.appendChild(b);
    });
    area.appendChild(itemRow);

  } else if(pz.type==='gears'){
    const GEARS=[{label:'גדול',size:58,color:'#ff9944',order:0},{label:'בינוני',size:44,color:'#9b59b6',order:1},{label:'קטן',size:32,color:'#44aaff',order:2},{label:'זעיר',size:22,color:'#5dcaa5',order:3}];
    const shuffled=[...GEARS].sort(()=>Math.random()-.5);
    const slots2=new Array(4).fill(null); let sel2=null; const slotEls2=[];

    const inst=document.createElement('div'); inst.style.cssText='font-size:13px;color:#c39bd3;margin-bottom:10px;';
    inst.innerHTML='<b style="color:#f8c8ff">מטרה:</b> לחצי על גלגל לבחור ואז על חריץ. סדרי <b style="color:#ff9944">מגדול לקטן</b>:';
    area.appendChild(inst);

    const slotRow2=document.createElement('div'); slotRow2.style.cssText='display:flex;gap:8px;justify-content:center;margin-bottom:12px;flex-wrap:wrap;';
    for(let i=0;i<4;i++){
      const s=document.createElement('div'); s.className='gear-slot';
      s.innerHTML='<span style="font-size:12px;color:#9b59b6;">'+(i+1)+'</span>';
      const si=i;
      s.onclick=()=>{
        if(sel2===null){document.getElementById('pz-fb').textContent='קודם בחרי גלגל!';document.getElementById('pz-fb').className='fail';return;}
        if(slots2[si]!==null)return;
        slots2[si]=sel2;
        const gg=shuffled[sel2];
        s.innerHTML='<div style="width:'+gg.size+'px;height:'+gg.size+'px;border-radius:50%;background:'+gg.color+';display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:bold;">'+gg.label+'</div>';
        s.classList.add('filled');
        document.querySelector('[data-gi="'+sel2+'"]').classList.add('used');
        sel2=null; document.querySelectorAll('.gear-piece').forEach(p=>p.style.boxShadow='none');
        document.getElementById('pz-fb').textContent='';
        sfx('click');
        if(slots2.every(v=>v!==null)){
          const ok=slots2.every((v,i)=>shuffled[v].order===i);
          if(ok){sfx('win');winPuzzle(pz,onWin);}
          else{sfx('fail');
            document.getElementById('pz-fb').textContent='לא נכון! הסדר: גדול, בינוני, קטן, זעיר';
            document.getElementById('pz-fb').className='fail';
            slots2.fill(null); sel2=null;
            slotEls2.forEach((s,i)=>{s.innerHTML='<span style="font-size:12px;color:#9b59b6;">'+(i+1)+'</span>';s.classList.remove('filled');});
            document.querySelectorAll('.gear-piece').forEach(p=>{p.classList.remove('used');p.style.boxShadow='none';});
          }
        }
      };
      slotEls2.push(s); slotRow2.appendChild(s);
    }
    area.appendChild(slotRow2);

    const tray2=document.createElement('div'); tray2.style.cssText='display:flex;gap:8px;justify-content:center;flex-wrap:wrap;';
    shuffled.forEach((gg,i)=>{
      const p=document.createElement('div'); p.className='gear-piece';
      p.innerHTML='<div style="width:'+gg.size+'px;height:'+gg.size+'px;border-radius:50%;background:'+gg.color+';display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:bold;">'+gg.label+'</div>';
      p.dataset.gi=i;
      p.onclick=()=>{
        if(p.classList.contains('used'))return;
        document.querySelectorAll('.gear-piece').forEach(pp=>pp.style.boxShadow='none');
        sel2=i; p.style.boxShadow='0 0 12px '+gg.color; sfx('click');
      };
      tray2.appendChild(p);
    });
    area.appendChild(tray2);
  }

  const cl=document.createElement('button'); cl.className='q-btn';
  cl.textContent='x סגור'; cl.style.cssText+='background:rgba(100,0,0,.3);border-color:#a32d2d;color:#f09595;margin-top:10px;';
  cl.onclick=()=>{stopSpeech();document.getElementById('puzzle').style.display='none';puzzleOn=false;};
  area.appendChild(cl);
  document.getElementById('puzzle').style.display='block';
}

// ══ GAME FLOW ══
function notify(msg){const n=document.getElementById('notif');n.textContent=msg;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),2800);}

function updateHUD(){
  document.getElementById('sp-bar').style.width=sp_val+'%';
  document.getElementById('mp-bar').style.width=mp_val+'%';
  document.getElementById('sparks').textContent='ניצוצות: '+sparks+'/7 \u2728';
}

function showSparkPop(msg){
  const el=document.getElementById('spark-pop');
  el.innerHTML='<div style="font-size:22px">\u2728</div><div>'+msg+'</div>';
  el.style.display='block'; setTimeout(()=>el.style.display='none',3500);
}

function startDialog(npc){
  if(dialogOn||puzzleOn)return;
  sfx('click');
  if(document.pointerLockElement)document.exitPointerLock();
  curNPC=npc; dialogOn=true; dialogReady=false;
  dQueue=npc.dialog; dIdx=0;
  document.getElementById('dlg-portrait').textContent=npc.emoji;
  showLine(0);
}

function showLine(idx){
  dialogReady=false;
  document.getElementById('dlg-name').textContent=curNPC.name+' אומר:';
  document.getElementById('dlg-text').textContent=dQueue[idx];
  document.getElementById('dlg-hint').textContent='מדבר... (לחצי כאן לדילוג)';
  document.getElementById('dialog').style.display='block';
  document.getElementById('interact-btn').style.display='block';
  document.getElementById('interact-btn').textContent='\uD83D\uDCAC דילוג';
  speakAndWait(dQueue[idx],curNPC.vi,()=>{
    dialogReady=true;
    const last=idx===dQueue.length-1;
    document.getElementById('dlg-hint').textContent=last?'לחצי כאן לחידה':'לחצי כאן להמשך';
    document.getElementById('interact-btn').textContent=last?'\uD83C\uDFAF לחידה!':'\u25BA המשך';
  });
}

function nextDialog(){
  if(currentAudio){stopSpeech();dialogReady=true;
    const last=dIdx===dQueue.length-1;
    document.getElementById('dlg-hint').textContent=last?'לחצי כאן לחידה':'לחצי כאן להמשך';
    document.getElementById('interact-btn').textContent=last?'\uD83C\uDFAF לחידה!':'\u25BA המשך';
    return;
  }
  if(!dialogReady)return;
  dIdx++;
  if(dIdx<dQueue.length){showLine(dIdx);}
  else{
    document.getElementById('dialog').style.display='none';
    document.getElementById('interact-btn').style.display='none';
    dialogOn=false; dialogReady=false;
    if(curNPC&&curNPC.puzzle)openPuzzle(curNPC.puzzle);
  }
}

function openPuzzle(pz){
  puzzleOn=true;
  document.getElementById('pz-title').textContent=pz.title;
  document.getElementById('pz-desc').textContent=pz.desc;
  document.getElementById('pz-fb').textContent=''; document.getElementById('pz-fb').className='';
  buildPuzzle(pz,()=>winPuzzle(pz));
}

function winPuzzle(pz){
  sparks++; mp_val=Math.min(100,mp_val+20); sp_val=Math.min(100,sp_val+10); updateHUD();
  document.getElementById('pz-fb').textContent='v ניצוץ '+ sparks +' מתוך 7 נאסף!';
  document.getElementById('pz-fb').className='ok';
  showSparkPop('ניצוץ '+sparks+'/7 נאסף! \u2728');
  sfx('win');
  if(curNPC)curNPC._done=true;
  const reward='כל הכבוד! הניצוץ '+ sparks +' שלך!';
  setTimeout(()=>speakAndWait(reward,curNPC?curNPC.vi:7,()=>{
    setTimeout(()=>{
      document.getElementById('puzzle').style.display='none';
      puzzleOn=false;
      if(sparks>=7)setTimeout(()=>narrate('לונה -- כל 7 הניצוצות חזרו! הקרן מאירה בקסם מלא! את ניצחת את המסע! ',10000),800);
    },800);
  }),500);
}

function interact(){
  if(!audioCtx){initAudio();playBg(worldIdx);}
  if(!gameActive||puzzleOn)return;
  if(dialogOn){nextDialog();return;}
  let nearest=null,nd=99;
  npcList.forEach(n=>{const d=lunaMesh.position.distanceTo(n.position);if(d<4&&d<nd){nd=d;nearest=n;}});
  if(nearest){startDialog(nearest.userData.npc);return;}
  // Check portals
  for(const portal of portals){
    const d=lunaMesh.position.distanceTo(portal.position);
    if(d<3.5){
      if(portal.userData.isReal){goNext();}
      else{sfx('fail');notify('שער שקרי! חזרת לנקודת ההתחלה!');lunaMesh.position.set(0,0,4);}
      return;
    }
  }
}

function goNext(){
  sfx('portal'); stopSpeech();
  const fl=document.getElementById('flash'); fl.style.opacity='1';
  setTimeout(()=>fl.style.opacity='0',500);
  worldIdx=(worldIdx+1)%WORLDS.length;
  setTimeout(()=>build(worldIdx),400);
}

function showQuit(){document.getElementById('qs-sp').textContent=sparks;document.getElementById('quit-screen').style.display='flex';stopBg();stopSpeech();gameActive=false;if(document.pointerLockElement)document.exitPointerLock();}
function hideQuit(){document.getElementById('quit-screen').style.display='none';gameActive=true;if(audioCtx&&soundEnabled)playBg(worldIdx);}
function quitGame(){stopBg();stopSpeech();document.getElementById('quit-screen').innerHTML='<h2 style="color:#f8c8ff">\u{1F984} המסע הסתיים</h2><p style="color:#c39bd3;font-size:15px">ניצוצות: '+sparks+'/7 \u2728</p><p style="color:#888;font-size:13px;margin-top:8px">'+(sparks>=7?'לונה הצליחה! הקרן מאירה!':'המסע עוד לא הסתיים...')+'</p><button onclick="location.reload()" style="background:#9b59b6;padding:12px 28px;border-radius:10px;font-size:14px;cursor:pointer;border:none;color:white;margin-top:14px;font-family:Heebo,Arial,sans-serif">\u25BA משחק חדש</button>';}

// ══ CONTROLS ══
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup')K.w=true;
  if(k==='s'||k==='arrowdown')K.s=true;
  if(k==='a'||k==='arrowleft')K.a=true;
  if(k==='d'||k==='arrowright')K.d=true;
  if(k==='e'){e.preventDefault();interact();}
  if(k==='q')goNext();
  if(k==='escape'){if(locked)document.exitPointerLock();else showQuit();}
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(k==='w'||k==='arrowup')K.w=false;
  if(k==='s'||k==='arrowdown')K.s=false;
  if(k==='a'||k==='arrowleft')K.a=false;
  if(k==='d'||k==='arrowright')K.d=false;
});
canvas.addEventListener('click',()=>{if(!audioCtx){initAudio();playBg(worldIdx);}if(!dialogOn&&!puzzleOn&&gameActive&&!locked)canvas.requestPointerLock();});
document.addEventListener('pointerlockchange',()=>locked=document.pointerLockElement===canvas);
document.addEventListener('mousemove',e=>{if(!locked||!gameActive)return;camYaw-=e.movementX*.003;camPitch=Math.max(.1,Math.min(.75,camPitch+e.movementY*.002));});
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

// ══ GAME LOOP ══
const fwd=new THREE.Vector3(),rt=new THREE.Vector3();

function loop(){
  const dt=Math.min(clock.getDelta(),.05);
  const t=clock.elapsedTime;
  let moving=false;

  if(!dialogOn&&!puzzleOn&&gameActive&&lunaMesh){
    const spd=4.0*dt;
    let dx=0,dz=0;
    if(K.w){dx+=Math.sin(camYaw)*spd;dz+=Math.cos(camYaw)*spd;moving=true;}
    if(K.s){dx-=Math.sin(camYaw)*spd;dz-=Math.cos(camYaw)*spd;moving=true;}
    if(K.a){dx+=Math.sin(camYaw-Math.PI/2)*spd;dz+=Math.cos(camYaw-Math.PI/2)*spd;moving=true;}
    if(K.d){dx-=Math.sin(camYaw-Math.PI/2)*spd;dz-=Math.cos(camYaw-Math.PI/2)*spd;moving=true;}
    if(moving){
      lunaMesh.position.x=Math.max(-55,Math.min(55,lunaMesh.position.x+dx));
      lunaMesh.position.z=Math.max(-55,Math.min(55,lunaMesh.position.z+dz));
      lunaMesh.rotation.y=Math.atan2(dx,dz);
      lunaLegPhase+=dt*8;
    }
    lunaMesh.position.y=moving?Math.abs(Math.sin(lunaLegPhase))*.07:0;
    const cx=lunaMesh.position.x-Math.sin(camYaw)*camDist*Math.cos(camPitch);
    const cz=lunaMesh.position.z-Math.cos(camYaw)*camDist*Math.cos(camPitch);
    const cy=lunaMesh.position.y+camDist*Math.sin(camPitch)+.5;
    camera.position.set(cx,cy,cz);
    camera.lookAt(lunaMesh.position.x,1.2,lunaMesh.position.z);
  }

  if(moving&&audioCtx&&soundEnabled){footTimer+=dt;if(footTimer>.4){sfx('step');footTimer=0;}}else footTimer=0;

  // Luna effects
  if(lunaMesh&&lunaMesh.userData.hornGlow){
    lunaMesh.userData.hornGlow.material.opacity=.15+Math.sin(t*3)*.12;
    lunaMesh.userData.hornGlow.scale.setScalar(1+Math.sin(t*4)*.08);
  }
  if(lunaMesh&&lunaMesh.userData.aura){
    lunaMesh.userData.aura.material.opacity=.05+Math.sin(t*1.5)*.04;
    lunaMesh.userData.aura.rotation.y=t*.5;
  }

  // Floaters
  floaters.forEach((o,i)=>{
    if(o.userData&&o.userData.isSea){
      const pos=o.geometry.attributes.position;
      if(pos){for(let j=0;j<pos.count;j++){const x=pos.getX(j),z=pos.getZ(j);pos.setY(j,Math.sin(x*.3+t)*.08+Math.sin(z*.4+t*.7)*.06);}pos.needsUpdate=true;}
    } else if(o.userData&&o.userData.isCloud){
      o.position.x+=.006; if(o.position.x>60)o.position.x=-60;
      o.position.y+=Math.sin(t*.2+i)*.002;
    } else if(o.userData&&o.userData.isGear){
      o.rotation.y+=o.userData.gs*dt;
    } else if(o.userData&&o.userData.isParticle){
      o.position.y=1+Math.sin(t*.8+o.userData.ph)*2.5;
      o.position.x+=Math.sin(t*.3+o.userData.ph)*.008;
    } else if(o.userData&&o.userData.isLava){
      o.material.emissiveIntensity=.6+Math.sin(t*2+i)*.3;
    } else {
      o.position.y=Math.sin(t*.7+i)*.6+1.2;
      if(o.userData.glow){o.userData.glow.position.copy(o.position);o.userData.glow.scale.setScalar(1+.2*Math.sin(t*2+i));}
    }
  });

  // Birds
  birds.forEach((b,i)=>{
    b.userData.dir+=(Math.random()-.5)*.018;
    b.position.x+=Math.cos(b.userData.dir)*b.userData.speed*dt;
    b.position.z+=Math.sin(b.userData.dir)*b.userData.speed*dt;
    b.position.y=5+Math.sin(t*.5+i)*.7;
    b.rotation.y=-b.userData.dir+Math.PI/2;
    const fl=Math.sin(t*4+b.userData.fp)*.3;
    if(b.userData.wL)b.userData.wL.rotation.z=fl;
    if(b.userData.wR)b.userData.wR.rotation.z=-fl;
    if(Math.abs(b.position.x)>30||Math.abs(b.position.z)>30)b.userData.dir+=Math.PI;
  });

  // NPC animation
  npcList.forEach(n=>{
    n.rotation.y=Math.sin(t*.4)*.25;
    if(n.userData.glow)n.userData.glow.scale.setScalar(1+.1*Math.sin(t*2.5));
  });

  // Portal pulse
  portals.forEach((p,i)=>{
    p.scale.setScalar(1+Math.sin(t*2+i)*.04);
  });

  // Proximity
  let near=false;
  if(lunaMesh){
    npcList.forEach(n=>{if(lunaMesh.position.distanceTo(n.position)<4)near=true;});
    let nearPortal=false;
    portals.forEach(p=>{if(lunaMesh.position.distanceTo(p.position)<4)nearPortal=true;});
    const nearEl=document.getElementById('near');
    const intBtn=document.getElementById('interact-btn');
    if((near||nearPortal)&&!dialogOn){
      nearEl.style.display='block';
      if(near)nearEl.textContent='לחצי E לשיחה \uD83D\uDCAC';
      else nearEl.textContent='לחצי E לשער \u2728';
      if(!dialogOn)intBtn.style.display='block';
    } else if(!dialogOn){
      nearEl.style.display='none';
      if(!dialogOn&&!puzzleOn)intBtn.style.display='none';
    }
  }

  renderer.render(scene,camera);
}

renderer.setAnimationLoop(loop);
build(0);
updateHUD();
setTimeout(()=>notify('לחצי על המסך -- WASD לזוז, E לשיחה!'),800);
</script>
